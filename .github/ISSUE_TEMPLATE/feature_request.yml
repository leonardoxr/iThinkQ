name: Feature request
description: Suggest a feature or device improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What should ThinkQ do?
    validations:
      required: true
  - type: textarea
    id: device
    attributes:
      label: Device Family
      description: Which LG device family is affected?
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Do not include tokens, raw payloads, or stable identifiers.
