name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  package:
    name: Package prerelease app
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and package
        run: ./script/package_release.sh
        env:
          THINKQ_RELEASE_VERSION: ${{ github.ref_name }}

      - name: Upload release asset
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/ThinkQ-${GITHUB_REF_NAME}-macos.zip" \
            --repo "$GITHUB_REPOSITORY" \
            --title "ThinkQ ${GITHUB_REF_NAME}" \
            --notes "Automated heavily WIP prerelease build for ${GITHUB_REF_NAME}. This app is not notarized yet and remains experimental." \
            --prerelease \
            --latest=false \
            --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
