name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  package:
    name: Package prerelease app
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and package
        run: ./script/package_release.sh
        env:
          THINKQ_RELEASE_VERSION: ${{ github.ref_name }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          fail_on_unmatched_files: true
          files: dist/ThinkQ-${{ github.ref_name }}-macos.zip
